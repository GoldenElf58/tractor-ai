name: Build Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller --onefile main.py

      - name: Package Linux
        if: matrix.artifact == 'linux'
        run: |
          mv dist/main dist/card-game-linux
          chmod +x dist/card-game-linux
          cd dist
          zip card-game-linux.zip card-game-linux

      - name: Package macOS
        if: matrix.artifact == 'macos'
        run: |
          mv dist/main dist/card-game-macos
          chmod +x dist/card-game-macos
          cd dist
          zip card-game-macos.zip card-game-macos

      - name: Package Windows
        if: matrix.artifact == 'windows'
        shell: cmd
        run: |
          ren dist\main.exe card-game-windows.exe

      - name: Upload Linux
        if: matrix.artifact == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/card-game-linux.zip

      - name: Upload macOS
        if: matrix.artifact == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/card-game-macos.zip

      - name: Upload Windows
        if: matrix.artifact == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/card-game-windows.exe
