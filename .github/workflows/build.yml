name: Build Release

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller

      - name: Build executable (macOS)
        shell: bash
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller \
            --onefile \
            --name tractor-ai-macos \
            --add-data "assets:assets" \
            main.py

      - name: Build executable (Linux)
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller \
            --onefile \
            --name tractor-ai-linux \
            --add-data "assets:assets" \
            main.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          pyinstaller ^
            --onefile ^
            --name tractor-ai-windows.exe ^
            --add-data "assets;assets" ^
            main.py

      - name: Package Linux
        if: matrix.artifact == 'linux'
        run: |
          chmod +x dist/tractor-ai-linux
          cd dist
          zip tractor-ai-linux.zip tractor-ai-linux

      - name: Package macOS
        if: matrix.artifact == 'macos'
        run: |
          chmod +x dist/tractor-ai-macos
          cd dist
          zip tractor-ai-macos.zip tractor-ai-macos

      - name: Upload Linux
        if: matrix.artifact == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tractor-ai-linux.zip

      - name: Upload macOS
        if: matrix.artifact == 'macos'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tractor-ai-macos.zip

      - name: Upload Windows
        if: matrix.artifact == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tractor-ai-windows.exe
