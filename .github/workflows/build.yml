name: Build Release

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller
        shell: bash

      - name: Build executable
        run: |
          pyinstaller --onefile main.py

      - name: Rename executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mv dist/main dist/card-game-${{ runner.os }}

      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        run: |
          ren dist\main.exe card-game-Windows.exe
        shell: cmd

      - name: Upload Release Asset (Linux/macOS)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/card-game-${{ runner.os }}

      - name: Upload Release Asset (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/card-game-Windows.exe
